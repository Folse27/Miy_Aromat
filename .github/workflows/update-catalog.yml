name: Update catalog data

on:
  schedule:
    # 05:00 and 13:00 UTC = 08:00 and 16:00 Kyiv summer time
    - cron: "0 5,13 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" button for testing

permissions:
  contents: write         # the job commits updated data files

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install deep-translator

      - name: Download feed from KeepinCRM
        env:
          FEED_URL: ${{ secrets.FEED_URL }}
        run: curl -sSf "$FEED_URL" -o feed.xml

      - name: Build catalog data
        # optional official APIs; remove these lines if using the free translator
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: python3 catalog/build_catalog.py feed.xml catalog

      - name: Commit updated data
        run: |
          rm -f feed.xml
          git config user.name "catalog-bot"
          git config user.email "actions@users.noreply.github.com"
          git add catalog/products.js catalog/products-all.js catalog/notes_cache.json
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
          else
            git commit -m "chore: update catalog data ($(date -u +'%Y-%m-%d %H:%M') UTC)"
            git push
          fi
